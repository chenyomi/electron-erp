name: Auto Tag on Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    name: Create release tag
    runs-on: ubuntu-latest
    outputs:
      tag_created: ${{ steps.tag.outputs.created }}
      tag_name: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version bump and push tag
        id: tag
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          CURRENT=$(node -p "require('./package.json').version")
          TAG="v${CURRENT}"

          if [[ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "First push to branch, previous version unknown"
            PREVIOUS=""
          else
            PREVIOUS=$(git show "${BEFORE_SHA}:package.json" 2>/dev/null \
              | node -e "const fs=require('fs');const d=fs.readFileSync(0,'utf8');try{console.log(JSON.parse(d).version)}catch{console.log('')}" \
              || echo "")
          fi

          echo "Previous version: ${PREVIOUS:-<none>}"
          echo "Current version:  ${CURRENT}"

          if [[ -n "$PREVIOUS" && "$CURRENT" == "$PREVIOUS" ]]; then
            echo "Version unchanged, skipping tag"
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "## Release skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "版本号未变化（仍为 \`${CURRENT}\`），不会打 tag，也不会打包。" >> "$GITHUB_STEP_SUMMARY"
            echo "如需重新打包：去 **Actions → Release → Run workflow**，或 bump 版本后再 push。" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists on remote, skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "## Release skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "Tag \`${TAG}\` 已存在，不会重复打 tag / 打包。" >> "$GITHUB_STEP_SUMMARY"
            echo "如需重新打包：去 **Actions → Release → Run workflow**，tag 填 \`${TAG}\`。" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${TAG}" -m "Release ${CURRENT}"
          git push origin "${TAG}"

          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Created and pushed tag ${TAG}"

  release:
    name: Build and publish release
    needs: tag
    if: needs.tag.outputs.tag_created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag_name }}
    permissions:
      contents: write
