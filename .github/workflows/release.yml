name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.0.3)'
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.0.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            args: --mac --arm64 --x64
          - os: windows-latest
            platform: win
            args: --win --x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Use HTTPS for GitHub git dependencies
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Configure pnpm for Mac dual-arch
        if: matrix.platform == 'mac'
        run: pnpm config set supported-architectures.cpu "arm64,x64"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Rebuild native modules for Electron
        run: pnpm rebuild:native

      - name: Build app
        run: pnpm build

      - name: Generate assets
        run: pnpm assets

      - name: Package installer
        shell: bash
        run: |
          unset CSC_LINK CSC_KEY_PASSWORD WIN_CSC_LINK WIN_CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID || true
          export CSC_IDENTITY_AUTO_DISCOVERY=false
          pnpm exec electron-builder ${{ matrix.args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.yml
            release/*.blockmap
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Verify update manifests match release files
        run: |
          node scripts/align-release-assets.cjs release-artifacts
          node scripts/verify-release-yml.cjs release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          append_body: true
          body: |
            ## 下载说明

            | 系统 | 文件 |
            | --- | --- |
            | Apple 芯片 Mac (M1/M2/M3) | `donghao-ledger-*-arm64-mac.zip`（自动更新）或 `donghao-ledger-*.dmg`（手动安装） |
            | Intel Mac | `donghao-ledger-*-mac.zip`（自动更新）或 `donghao-ledger-*.dmg`（手动安装） |
            | Windows 64 位 | `donghao-ledger-setup-*.exe` |
            | 自动更新 | 应用启动后会检查 GitHub Release；也可在「帮助 > 检查更新」手动检查 |

            ### 自动更新说明

            - Windows：支持下载后重启安装
            - macOS：需要 Release 中包含对应架构的 `.zip` 和 `latest-mac*.yml`
            - 未签名 macOS 应用更新后，仍可能需要右键打开或执行 `xattr -cr`

            ### macOS 提示「已损坏，无法打开」？

            这是 **未签名应用** 被系统拦截，不是安装包坏了。Chrome 下载后会附加隔离标记，按下面任一方式即可：

            **方法一（推荐）** — 终端执行（把 app 拖进「应用程序」后）：

            ```bash
            xattr -cr "/Applications/东昊账务.app"
            ```

            **方法二** — 右键点击 app → **打开** → 再点 **打开**（仅首次需要）。

            **方法三** — 系统设置 → 隐私与安全性 → 找到被拦截提示 → **仍要打开**。

            > 若需免上述步骤，需购买 Apple 开发者证书，并在仓库 Secrets 中设置 `ENABLE_CODE_SIGNING=true` 及对应证书变量。
          files: release-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
